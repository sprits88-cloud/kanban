<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크립트 로드 테스트</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .log {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-left: 4px solid #4caf50;
        }
        .error {
            border-left-color: #f44336;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>🔍 스크립트 로드 테스트</h1>
    <p>이 페이지는 스크립트가 제대로 로드되는지 확인합니다.</p>

    <div id="results"></div>

    <h2>다음 단계:</h2>
    <ol>
        <li>F12를 눌러 개발자 도구를 여세요</li>
        <li>Console 탭을 선택하세요</li>
        <li>아래 정보를 확인하세요</li>
    </ol>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Configuration -->
    <script src="config.js"></script>

    <!-- JavaScript -->
    <script src="script.js"></script>

    <script>
        const results = document.getElementById('results');

        function addLog(message, isError = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : '');
            div.innerHTML = message;
            results.appendChild(div);
        }

        // Check if Supabase SDK loaded
        if (typeof window.supabase !== 'undefined') {
            addLog('✅ Supabase SDK 로드 성공');
        } else {
            addLog('❌ Supabase SDK 로드 실패', true);
        }

        // Check if SUPABASE_CONFIG exists
        if (typeof SUPABASE_CONFIG !== 'undefined') {
            addLog('✅ config.js 로드 성공');
            addLog(`📍 Supabase URL: <code>${SUPABASE_CONFIG.url}</code>`);
        } else {
            addLog('❌ config.js 로드 실패', true);
        }

        // Check if script.js functions exist
        if (typeof createCard !== 'undefined') {
            addLog('✅ script.js 로드 성공 (createCard 함수 발견)');
        } else {
            addLog('❌ script.js 로드 실패', true);
        }

        // Check for duplicate supabase variable
        addLog('<strong>🔍 변수 타입 확인:</strong>');
        addLog(`typeof supabase: <code>${typeof supabase}</code>`);

        console.log('=== 스크립트 로드 테스트 ===');
        console.log('window.supabase:', typeof window.supabase);
        console.log('SUPABASE_CONFIG:', typeof SUPABASE_CONFIG);
        console.log('supabase variable:', typeof supabase);
        console.log('createCard:', typeof createCard);
    </script>
</body>
</html>
